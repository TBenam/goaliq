server {
    listen 80;
    server_name _; # Remplacer par votre domaine en prod

    # Challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection HTTP vers HTTPS (à activer après avoir généré le certificat)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    root /usr/share/nginx/html;
    index index.html;

    # Proxy toutes les requêtes /api/ vers le backend Node.js
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing : toutes les routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets statiques
    location ~* \.(js|css|png|svg|ico|webp|woff2|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

