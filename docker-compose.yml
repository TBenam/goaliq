services:

  # ── Backend Node.js (API + Cron scheduler) ──────────
  api:
    build: ./backend
    container_name: goliat-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
      - ADMIN_SECRET=${ADMIN_SECRET}
    volumes:
      # Données persistantes : cache JSON + SQLite + logs
      - goliat_cache:/app/cache/data
      - goliat_db:/app/db/data
      - goliat_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Nginx (PWA statique) ───────────────────
  frontend:
    build: .
    container_name: goliat-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/certbot
    depends_on:
      - api

  # ── Certbot (SSL Auto-renewal) ──────────────────────
  certbot:
    image: certbot/certbot
    container_name: goliat-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  goliat_cache:
  goliat_db:
  goliat_logs:
  certbot-etc:
  certbot-var:
  web-root:
